<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Banana Survivors</title>
    <link rel="manifest" href="https://progressier.app/h4uWewrMmLAvKOzytwMk/progressier.json" />
    <script defer src="https://progressier.app/h4uWewrMmLAvKOzytwMk/script.js"></script>
    <link href="google_font.css" rel="stylesheet">
    <!-- <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700&display=swap"
        rel="stylesheet"> -->
    <link rel="apple-touch-icon" href="assets/icon.png">
    <link rel="icon" type="image/png" href="assets/icon.png">
    <meta name="theme-color" content="#c5ab15">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: #111;
            /* Flexbox ensures the container stays centered regardless of screen width */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            font-family: 'Fredoka One', sans-serif;
        }

        #game-container {
            position: relative;
            /* The max-width/height sets the 'ideal' portrait bounds */
            width: 100%;
            height: 100%;
            max-width: 540px;
            max-height: 960px;
            aspect-ratio: 9 / 16;
            overflow: hidden;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.5);
        }

        canvas {
            display: block;
            touch-action: none;
        }

        #loading {
            position: absolute;
            inset: 0;
            background: #1a1a1a;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            transition: opacity 0.5s;
        }

        #loading h1 {
            font-size: 42px;
            color: #c5ab15;
            /* text-shadow: 0 0 20px rgba(255, 215, 0, 0.5); */
            margin-bottom: 12px;
        }

        #loading p {
            color: #888;
            font-size: 16px;
            margin-bottom: 30px;
        }

        .loader-bar {
            width: 200px;
            height: 8px;
            background: #333;
            border-radius: 4px;
            overflow: hidden;
        }

        .loader-fill {
            height: 100%;
            width: 0;
            background: linear-gradient(90deg, #ffd700, #ffd700);
            /* #ff6600);  */
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <div id="game-container">
        <div id="loading">
            <img src="assets/banana.png" width="64" height="64" alt="banana" style="margin-bottom: 8px" />
            <h1 style="font-size:28px;margin-top:-10px">BANANA SURVIVORS</h1>
            <p>Generating wasteland…</p>
            <p style="font-size:12px">Please Wait...</p>
            <div class="loader-bar">
                <div class="loader-fill" id="loader-fill"></div>
            </div>
        </div>
    </div>

    <script src="phaser.min.js"></script>

    <script>window.LOOTLOCKER_API_KEY = "dev_c5adaa99b89344599c92f2f0e535f96a";</script>
    <script src="lootlocker.js"></script>
    <script src="scene.fx.js"></script>
    <script src="noise.js"></script>
    <script src="config.js"></script>
    <script src="base.js"></script>
    <script src="abilities.js"></script>
    <script src="player.js"></script>
    <script src="enemies.js"></script>
    <script src="ui.js"></script>
    <script src="scenes.js"></script>

    <script>
        window.addEventListener('load', () => {
            const loading = document.getElementById('loading');

            const game = new Phaser.Game({
                type: Phaser.AUTO,
                width: 540,
                height: 960,
                parent: 'game-container',
                backgroundColor: '#1a1a1a',
                scale: {
                    mode: Phaser.Scale.FIT,
                    autoCenter: Phaser.Scale.CENTER_BOTH
                },
                scene: [BootScene, MainMenuScene, StatsScene, LeaderboardScene, ClassSelectScene, GameScene, UIScene, GameOverScene],
                physics: {
                    default: 'arcade',
                    arcade: {
                        debug: false
                    }
                },
                input: {
                    gamepad: false
                },
            });

            // Let BootScene control when the loading screen goes away
            // game.events.once('ready', () => { ... }) has been moved to BootScene.create()



        });

    </script>
</body>

</html>
